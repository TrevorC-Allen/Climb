<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f5f7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Climb" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Climb</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/app-icon.svg" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="主导航">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div>
            <p class="eyebrow">Climb</p>
            <h1>训练台</h1>
          </div>
        </div>

        <nav class="nav-list">
          <button class="nav-item active" type="button" data-view="dashboard" aria-current="page">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 13h6V4H4v9Zm0 7h6v-5H4v5Zm10 0h6v-9h-6v9Zm0-11h6V4h-6v5Z"/></svg>
            <span>看板</span>
          </button>
          <button class="nav-item" type="button" data-view="log">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h9.6L20 7.4V21H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Zm8.8 1.8V8H18l-3.2-3.2ZM8 12h8v-1.6H8V12Zm0 4h8v-1.6H8V16Z"/></svg>
            <span>记录</span>
          </button>
          <button class="nav-item" type="button" data-view="motion">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5.8a2.3 2.3 0 1 0 0-4.6 2.3 2.3 0 0 0 0 4.6ZM7.8 8.4 3.5 12l1.1 1.3 3.6-3 1.4.7-2.2 5.4L4 20.2l1.3 1.1 3.7-4.1 1.6-3.9 2.4 2.1v6.1h1.8v-7l-3.2-2.8.7-2.1 2.3 2 4.8.8.3-1.8-4.2-.7-3.2-2.8a3.2 3.2 0 0 0-4.5 1.3Z"/></svg>
            <span>动作</span>
          </button>
          <button class="nav-item" type="button" data-view="history">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h14v2H5V4Zm0 5h14v2H5V9Zm0 5h10v2H5v-2Zm0 5h7v2H5v-2Z"/></svg>
            <span>历史</span>
          </button>
        </nav>

        <div class="side-summary">
          <p>本周负荷</p>
          <strong id="sidebarLoad">0</strong>
          <span id="sidebarLoadLabel">暂无记录</span>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="todayLabel">今日</p>
            <h2 id="viewTitle">训练看板</h2>
          </div>
          <div class="top-actions">
            <button class="icon-button" type="button" id="exportButton" aria-label="导出数据" title="导出数据">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v11.1l3.5-3.5 1.3 1.3-5.7 5.7-5.7-5.7 1.3-1.3 3.5 3.5V3H12Zm-7 16h14v2H5v-2Z"/></svg>
            </button>
            <button class="primary-button" type="button" data-view="log">新增记录</button>
          </div>
        </header>

        <section class="view active" id="dashboard-view" aria-labelledby="viewTitle">
          <div class="metric-grid">
            <article class="metric">
              <span>训练日</span>
              <strong id="metricSessions">0</strong>
              <small id="metricSessionsHint">近 30 天</small>
            </article>
            <article class="metric">
              <span>完成率</span>
              <strong id="metricSendRate">0%</strong>
              <small id="metricSendRateHint">全部线路</small>
            </article>
            <article class="metric">
              <span>稳定抱石</span>
              <strong id="metricStableBoulder">-</strong>
              <small>至少两次完成</small>
            </article>
            <article class="metric">
              <span>稳定难度</span>
              <strong id="metricStableRoute">-</strong>
              <small>顶绳 / 先锋</small>
            </article>
          </div>

          <div class="dashboard-layout">
            <section class="panel chart-panel">
              <div class="panel-header">
                <div>
                  <p class="eyebrow">Grade Pyramid</p>
                  <h3>成绩结构</h3>
                </div>
                <div class="segmented-control" role="tablist" aria-label="项目筛选">
                  <button class="segment active" type="button" data-discipline-filter="all">全部</button>
                  <button class="segment" type="button" data-discipline-filter="boulder">抱石</button>
                  <button class="segment" type="button" data-discipline-filter="route">难度</button>
                </div>
              </div>
              <div class="grade-chart" id="gradeChart" aria-label="难度金字塔"></div>
            </section>

            <section class="panel advice-panel">
              <div class="panel-header">
                <div>
                  <p class="eyebrow">Coach</p>
                  <h3>训练建议</h3>
                </div>
                <span class="status-pill" id="coachStatus">就绪</span>
              </div>
              <div class="advice-list" id="adviceList"></div>
            </section>
          </div>

          <div class="dashboard-layout lower-layout">
            <section class="panel">
              <div class="panel-header">
                <div>
                  <p class="eyebrow">Progress</p>
                  <h3>提升轨迹</h3>
                </div>
              </div>
              <div class="progress-strip" id="progressStrip"></div>
            </section>

            <section class="panel">
              <div class="panel-header">
                <div>
                  <p class="eyebrow">Recent</p>
                  <h3>最近记录</h3>
                </div>
              </div>
              <div class="recent-list" id="recentList"></div>
            </section>
          </div>
        </section>

        <section class="view" id="log-view" aria-labelledby="viewTitle">
          <div class="editor-layout">
            <form class="panel entry-form" id="entryForm">
              <div class="panel-header">
                <div>
                  <p class="eyebrow">Log</p>
                  <h3>训练记录</h3>
                </div>
                <button class="secondary-button" type="button" id="fillTodayButton">今天</button>
              </div>

              <div class="form-grid">
                <label>
                  <span>日期</span>
                  <input id="dateInput" name="date" type="date" required />
                </label>
                <label>
                  <span>岩馆</span>
                  <input id="gymInput" name="gym" list="gymOptions" placeholder="岩馆名称" required />
                  <datalist id="gymOptions"></datalist>
                </label>
                <label>
                  <span>类型</span>
                  <select id="disciplineInput" name="discipline" required>
                    <option value="boulder">抱石</option>
                    <option value="toprope">顶绳</option>
                    <option value="lead">先锋</option>
                  </select>
                </label>
                <label>
                  <span>难度体系</span>
                  <select id="gradeSystemInput" name="gradeSystem" required>
                    <option value="V">V Scale</option>
                    <option value="YDS">YDS</option>
                  </select>
                </label>
                <label>
                  <span>难度</span>
                  <input id="gradeInput" name="grade" list="gradeOptions" placeholder="V4 / 5.10a" required />
                  <datalist id="gradeOptions"></datalist>
                </label>
                <label>
                  <span>结果</span>
                  <select id="resultInput" name="result" required>
                    <option value="flash">Flash</option>
                    <option value="onsight">Onsight</option>
                    <option value="send">完成</option>
                    <option value="attempt">尝试</option>
                    <option value="fail">未完成</option>
                  </select>
                </label>
                <label>
                  <span>尝试次数</span>
                  <input id="attemptsInput" name="attempts" type="number" min="1" max="99" value="1" required />
                </label>
                <label>
                  <span>体感强度</span>
                  <input id="rpeInput" name="rpe" type="range" min="1" max="10" value="6" />
                  <output id="rpeOutput">6</output>
                </label>
              </div>

              <fieldset class="tag-fieldset">
                <legend>风格</legend>
                <div class="tag-grid" id="styleTags"></div>
              </fieldset>

              <label class="notes-label">
                <span>备注</span>
                <textarea id="notesInput" name="notes" rows="4" placeholder="卡点、换脚、发力感受"></textarea>
              </label>

              <div class="form-actions">
                <button class="primary-button" type="submit">保存记录</button>
                <button class="secondary-button" type="reset">重置</button>
              </div>
            </form>

            <section class="panel">
              <div class="panel-header">
                <div>
                  <p class="eyebrow">Session</p>
                  <h3>本次训练</h3>
                </div>
              </div>
              <div class="session-summary" id="sessionSummary"></div>
              <div class="mini-timeline" id="miniTimeline"></div>
            </section>
          </div>
        </section>

        <section class="view" id="motion-view" aria-labelledby="viewTitle">
          <div class="motion-layout">
            <section class="panel camera-panel">
              <div class="panel-header">
                <div>
                  <p class="eyebrow">Motion</p>
                  <h3>动作分析</h3>
                </div>
                <div class="camera-actions">
                  <label class="icon-button file-button" aria-label="导入视频" title="导入视频">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h11v2H4v12h16v-8h2v10H2V5h2Zm14.5-2 3.5 3.5-1.2 1.2-1.4-1.4V15h-1.8V6.3l-1.4 1.4L15 6.5 18.5 3Z"/></svg>
                    <input id="videoInput" type="file" accept="video/*" />
                  </label>
                  <button class="icon-button" type="button" id="cameraButton" aria-label="开启摄像头" title="开启摄像头">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7.5 5 9.2 3h5.6l1.7 2H21v15H3V5h4.5ZM12 8a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9Zm0 1.8a2.7 2.7 0 1 1 0 5.4 2.7 2.7 0 0 1 0-5.4Z"/></svg>
                  </button>
                  <button class="icon-button" type="button" id="centerTrailButton" aria-label="显示重心轨迹" aria-pressed="false" title="显示重心轨迹">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 17.5a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm7-7.5a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm7-7.5a2 2 0 1 0 0 4 2 2 0 0 0 0-4ZM6.2 17.1l4.4-3.8-1.2-1.4L5 15.7l1.2 1.4Zm7.1-7.2 4.4-3.8-1.2-1.4-4.4 3.8 1.2 1.4Z"/></svg>
                  </button>
                </div>
              </div>
              <div class="video-stage">
                <video id="motionVideo" playsinline muted></video>
                <canvas id="motionCanvas" width="960" height="540" aria-hidden="true"></canvas>
                <div class="video-state" id="videoState">未接入姿态模型</div>
              </div>
            </section>

            <section class="panel analyzer-panel">
              <div class="panel-header">
                <div>
                  <p class="eyebrow">Rules</p>
                  <h3>检测规则</h3>
                </div>
                <button class="secondary-button" type="button" id="saveSnapshotButton">保存片段</button>
              </div>

              <div class="control-stack">
                <label class="range-row">
                  <span>左肘角度</span>
                  <input id="leftElbowRange" type="range" min="60" max="190" value="158" />
                  <output id="leftElbowOutput">158°</output>
                </label>
                <label class="range-row">
                  <span>右肘角度</span>
                  <input id="rightElbowRange" type="range" min="60" max="190" value="174" />
                  <output id="rightElbowOutput">174°</output>
                </label>
                <label class="range-row">
                  <span>支撑点</span>
                  <input id="supportRange" type="range" min="1" max="4" value="3" />
                  <output id="supportOutput">3</output>
                </label>
                <label class="range-row">
                  <span>重心偏移</span>
                  <input id="centerRange" type="range" min="-100" max="100" value="18" />
                  <output id="centerOutput">18</output>
                </label>
                <label class="range-row">
                  <span>躯干旋转</span>
                  <input id="twistRange" type="range" min="0" max="90" value="16" />
                  <output id="twistOutput">16°</output>
                </label>
              </div>

              <div class="motion-metrics" id="motionMetrics"></div>
            </section>
          </div>
        </section>

        <section class="view" id="history-view" aria-labelledby="viewTitle">
          <section class="panel history-panel">
            <div class="panel-header">
              <div>
                <p class="eyebrow">Archive</p>
                <h3>全部记录</h3>
              </div>
              <div class="history-actions">
                <input id="importInput" type="file" accept="application/json" />
                <button class="secondary-button" type="button" id="importButton">导入</button>
                <button class="secondary-button danger" type="button" id="clearButton">清空</button>
              </div>
            </div>
            <div class="filter-row">
              <label>
                <span>筛选</span>
                <select id="historyFilter">
                  <option value="all">全部</option>
                  <option value="boulder">抱石</option>
                  <option value="route">难度</option>
                  <option value="sent">已完成</option>
                  <option value="project">项目</option>
                </select>
              </label>
              <label>
                <span>岩馆</span>
                <select id="gymFilter">
                  <option value="all">全部岩馆</option>
                </select>
              </label>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>日期</th>
                    <th>岩馆</th>
                    <th>类型</th>
                    <th>难度</th>
                    <th>结果</th>
                    <th>尝试</th>
                    <th>风格</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="historyTable"></tbody>
              </table>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
